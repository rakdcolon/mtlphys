name: mtlphys

options:
  bundleIdPrefix: com.mtlphys
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    CLANG_CXX_LANGUAGE_STANDARD: c++20
    CLANG_CXX_LIBRARY: libc++
    CLANG_ENABLE_OBJC_ARC: YES
    SWIFT_VERSION: "5.10"
    GCC_WARN_ABOUT_MISSING_NEWLINE: NO

targets:
  MtlPhysCore:
    type: library.static
    platform: macOS
    sources:
      - path: engine/src
      - path: engine/include
        buildPhase: headers
    settings:
      base:
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/metal-cpp
          - $(SRCROOT)/engine/include
          - $(SRCROOT)/engine/shaders

  mtlphys:
    type: application
    platform: macOS
    sources:
      - path: app
        excludes:
          - "bridge/Bridging-Header.h"
      - path: engine/shaders
    dependencies:
      - target: MtlPhysCore
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: Foundation.framework
      - sdk: AppKit.framework
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: app/bridge/Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/metal-cpp
          - $(SRCROOT)/engine/include
          - $(SRCROOT)/engine/shaders
          - $(SRCROOT)/app/bridge
        INFOPLIST_FILE: app/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mtlphys.app
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"

  mtlphys_tests:
    type: tool
    platform: macOS
    sources:
      - path: tests
      - path: engine/shaders
    dependencies:
      - target: MtlPhysCore
      - sdk: Metal.framework
      - sdk: Foundation.framework
    settings:
      base:
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/metal-cpp
          - $(SRCROOT)/vendor/doctest
          - $(SRCROOT)/engine/include
          - $(SRCROOT)/engine/shaders
          - $(SRCROOT)/tests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
